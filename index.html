<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>لعبة الصياد (The Hunter)</title>
    
    <script src="https://sdk.minepi.com/pi-sdk.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #0f172a;
            color: #ffffff;
            text-align: center;
            margin: 0;
            padding: 20px;
        }
        .container {
            max-width: 600px;
            margin: 0 auto;
            /* خلفية الفارس أبو كريم الرسمية مع تعتيم سينمائي */
            background: linear-gradient(rgba(30, 41, 59, 0.85), rgba(15, 23, 42, 0.85)), url('hunter-logo.png');
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            padding: 20px;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.7);
            border: 2px solid #38bdf8;
            transition: transform 0.05s linear;
        }
        h1 { color: #38bdf8; }
        .btn {
            background-color: #38bdf8;
            color: #0f172a;
            border: none;
            padding: 10px 20px;
            font-size: 16px;
            font-weight: bold;
            border-radius: 5px;
            cursor: pointer;
            margin: 10px;
        }
        .btn:hover { background-color: #0ea5e9; }
        .hidden { display: none; }
        .stats {
            display: flex;
            justify-content: space-around;
            background-color: rgba(15, 23, 42, 0.9);
            padding: 10px;
            border-radius: 5px;
            margin-bottom: 20px;
            border: 1px solid rgba(56, 189, 248, 0.2);
        }
        #hunting-canvas {
            background: radial-gradient(circle, rgba(17, 24, 39, 0.9) 0%, rgba(3, 7, 18, 0.95) 100%);
            border: 2px solid #38bdf8;
            border-radius: 10px;
            cursor: crosshair;
            max-width: 100%;
            touch-action: none;
            box-shadow: inset 0 0 20px rgba(56, 189, 248, 0.2);
        }
        #game-status {
            color: #fbbf24;
            font-weight: bold;
            margin: 10px 0;
            text-shadow: 1px 1px 2px #000;
        }
        .btn-pay {
            background-color: #eab308;
            color: #0f172a;
        }
        .btn-pay:hover { background-color: #ca8a04; }
        
        .leaderboard-table {
            width: 100%;
            margin-top: 20px;
            border-collapse: collapse;
            background-color: rgba(15, 23, 42, 0.85);
        }
        .leaderboard-table th, .leaderboard-table td {
            padding: 10px;
            border: 1px solid #334155;
            text-align: center;
        }
        .leaderboard-table th { background-color: #334155; color: #38bdf8; }
    </style>
</head>
<body>

<div class="container" id="game-container">
    <h1>🎮 لعبة الصياد (The Hunter)</h1>
    <p>مشروع متصل بـ Supabase وبوابة دفع Pi 💎</p>

    <div id="auth-section">
        <button class="btn" onclick="initAndLoginWithPi()">دخول مجاني وبدء اللعب</button>
    </div>

    <div id="game-section" class="hidden">
        <div class="stats">
            <div>الصياد: <span id="player-name" style="color: #38bdf8;">...</span></div>
            <div>النقاط: <span id="score-val" style="color: #4ade80;">0</span> 🎯</div>
            <div>الذخيرة: <span id="ammo-val" style="color: #f87171;">30</span> 🎈</div>
            <div>المستوى: <span id="level-val" style="color: #a855f7;">1</span> ⚡</div>
        </div>

        <canvas id="hunting-canvas" width="480" height="300"></canvas>
        <p id="game-status">جاري تجهيز اللعبة والمؤثرات...</p>
        
        <button class="btn btn-pay" onclick="buyAmmoWithPi()">🪙 شحن 30 ذخيرة (1 Pi)</button>

        <h3>🏆 لوحة الصدارة العالمية</h3>
        <table class="leaderboard-table">
            <thead>
                <tr>
                    <th>الترتيب</th>
                    <th>الصياد</th>
                    <th>أعلى سكور 🎯</th>
                </tr>
            </thead>
            <tbody id="leaderboard-body">
                <tr>
                    <td colspan="3">جاري تحميل لوحة الصدارة...</td>
                </tr>
            </tbody>
        </table>
    </div>
</div>

<script>
    const SUPABASE_URL = "https://xolwuawlnruvzqowxxbh.supabase.co";
    const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InhvbHd1YXdsbnJ1dnpxb3d4eGJoIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzcyMzgyNjEsImV4cCI6MjA5MjgxNDI2MX0.9ZbncYpfTr3qpFWZ-7yx8M_jf4MHpHzdp_mcuICS28w";
    const TABLE_NAME = "hunter_game_scores"; 

    const _supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    let score = 0;
    let ammo = 30;
    let gameLevel = 1;
    let playerPiUser = "";
    let playerWallet = ""; 
    let currentPiUserId = ""; 
    let isSdkInitialized = false;

    let target = { x: 150, y: 150, xSpeed: 4, ySpeed: 3, radius: 20, angle: 0 };
    let particles = [];
    let flashIntensity = 0;
    let screenShake = 0;

    const canvas = document.getElementById('hunting-canvas');
    const ctx = canvas.getContext('2d');
    let gameInterval;

    const audioCtx = new (window.AudioContext || window.webkitAudioContext)();

    function playSound(type) {
        if (!audioCtx) return;
        try {
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.connect(gain);
            gain.connect(audioCtx.destination);

            if (type === 'shoot') {
                osc.type = 'sawtooth';
                osc.frequency.setValueAtTime(350, audioCtx.currentTime);
                osc.frequency.exponentialRampToValueAtTime(60, audioCtx.currentTime + 0.08);
                gain.gain.setValueAtTime(0.2, audioCtx.currentTime);
                gain.gain.linearRampToValueAtTime(0.01, audioCtx.currentTime + 0.08);
                osc.start(); osc.stop(audioCtx.currentTime + 0.08);
            } else if (type === 'hit') {
                osc.type = 'square';
                osc.frequency.setValueAtTime(180, audioCtx.currentTime);
                osc.frequency.exponentialRampToValueAtTime(500, audioCtx.currentTime + 0.2);
                gain.gain.setValueAtTime(0.3, audioCtx.currentTime);
                gain.gain.linearRampToValueAtTime(0.01, audioCtx.currentTime + 0.2);
                osc.start(); osc.stop(audioCtx.currentTime + 0.2);
            } else if (type === 'empty') {
                osc.type = 'triangle';
                osc.frequency.setValueAtTime(100, audioCtx.currentTime);
                gain.gain.setValueAtTime(0.15, audioCtx.currentTime);
                gain.gain.linearRampToValueAtTime(0.01, audioCtx.currentTime + 0.05);
                osc.start(); osc.stop(audioCtx.currentTime + 0.05);
            }
        } catch(e){}
    }

    // --- المصادقة الرسمية والمزامنة الحية المباشرة (مؤمنة بالكامل) ---
    function initAndLoginWithPi() {
        if (audioCtx.state === 'suspended') audioCtx.resume();
        try {
            if (typeof Pi !== 'undefined' && window.Pi) {
                if (!isSdkInitialized) {
                    window.Pi.init({ version: "2.0" });
                    isSdkInitialized = true;
                }
                
                window.Pi.authenticate(['username', 'payments'], onIncompletePaymentFound)
                .then(function(auth) {
                    playerPiUser = auth.user.username;
                    currentPiUserId = auth.user.uid;
                    playerWallet = auth.user.uid || "Pi_User";
                    handleLoginSuccess();
                })
                .catch((err) => {
                    console.error("خطأ في المصادقة الرسمية:", err);
                    setupDevAccount();
                });
            } else {
                setupDevAccount();
            }
        } catch (e) {
            setupDevAccount();
        }
    }

    function setupDevAccount() {
        playerPiUser = "Abokareem999";
        currentPiUserId = "UID_ABUKAREEM_OFFICIAL_999";
        playerWallet = "GCOHCVV66Y7UX3KB36V4B7NS5W"; 
        handleLoginSuccess();
    }

    async function handleLoginSuccess() {
        document.getElementById('player-name').innerText = playerPiUser;
        
        try {
            let { data } = await _supabaseClient
                .from(TABLE_NAME)
                .select('high_score')
                .eq('pi_username', playerPiUser)
                .maybeSingle();
                
            if (data) { 
                score = data.high_score || 0; 
                document.getElementById('score-val').innerText = score;
                gameLevel = Math.floor(score / 50) + 1;
                document.getElementById('level-val').innerText = gameLevel;
            }
        } catch(e) {}
        
        updateSupabaseScore();
        document.getElementById('auth-section').className = 'hidden';
        document.getElementById('game-section').className = '';
        startGameLoop();
        loadLeaderboard();
    }

    async function updateSupabaseScore() {
        if (!playerPiUser) return;
        try {
            const payload = { 
                pi_username: playerPiUser, 
                wallet_address: playerWallet,
                high_score: score,
                updated_at: new Date().toISOString()
            };
            await _supabaseClient.from(TABLE_NAME).upsert(payload, { onConflict: 'pi_username' });
            loadLeaderboard();
        } catch (err) {}
    }

    async function loadLeaderboard() {
        try {
            let { data } = await _supabaseClient.from(TABLE_NAME).select('pi_username, high_score').order('high_score', { ascending: false }).limit(5);
            const tbody = document.getElementById('leaderboard-body');
            tbody.innerHTML = "";
            if (data && data.length > 0) {
                data.forEach((row, index) => {
                    const tr = document.createElement('tr');
                    if (row.pi_username === playerPiUser) tr.style.backgroundColor = "rgba(56, 189, 248, 0.2)";
                    tr.innerHTML = `<td>${index + 1}</td><td>${row.pi_username}</td><td>${row.high_score || 0}</td>`;
                    tbody.appendChild(tr);
                });
            }
        } catch (err) {}
    }

    function createExplosion(x, y) {
        for (let i = 0; i < 12; i++) {
            particles.push({
                x: x, y: y,
                vx: (Math.random() - 0.5) * 6,
                vy: (Math.random() - 0.5) * 6,
                radius: Math.random() * 3 + 1.5,
                alpha: 1,
                color: `hsl(${Math.random() * 40 + 15}, 100%, 60%)`
            });
        }
    }

    function executeShot(clientX, clientY) {
        if (ammo <= 0) {
            playSound('empty');
            document.getElementById('game-status').innerText = "❌ نفدت الذخيرة! اشحن حقيبتك باستخدام عملة Pi.";
            return;
        }
        
        ammo--; 
        document.getElementById('ammo-val').innerText = ammo;
        playSound('shoot');
        
        const rect = canvas.getBoundingClientRect();
        const mouseX = clientX - rect.left; 
        const mouseY = clientY - rect.top;
        
        flashIntensity = 0.3; 
        screenShake = 5;      

        const distance = Math.sqrt((mouseX - target.x)**2 + (mouseY - target.y)**2);

        if (distance <= target.radius) {
            score += 10;
            document.getElementById('score-val').innerText = score;
            playSound('hit');
            createExplosion(target.x, target.y);
            
            let newLevel = Math.floor(score / 50) + 1;
            if (newLevel > gameLevel) {
                gameLevel = newLevel;
                document.getElementById('level-val').innerText = gameLevel;
                target.xSpeed += (target.xSpeed > 0 ? 1 : -1);
                target.ySpeed += (target.ySpeed > 0 ? 1 : -1);
            }
            
            document.getElementById('game-status').innerText = "🎯 تم إصابة الهدف بنجاح! +10 نقاط";
            updateSupabaseScore(); 
            resetTarget();
        }
    }

    canvas.addEventListener('mousedown', (e) => executeShot(e.clientX, e.clientY));
    canvas.addEventListener('touchstart', (e) => {
        if(e.touches.length > 0) executeShot(e.touches[0].clientX, e.touches[0].clientY);
    });

    function startGameLoop() {
        if(gameInterval) clearInterval(gameInterval);
        gameInterval = setInterval(() => {
            target.x += target.xSpeed; 
            target.y += target.ySpeed;
            target.angle += 0.04;
            
            if (target.x - target.radius < 0 || target.x + target.radius > canvas.width) target.xSpeed = -target.xSpeed;
            if (target.y - target.radius < 0 || target.y + target.radius > canvas.height) target.ySpeed = -target.ySpeed;
            
            if (screenShake > 0) {
                const dx = (Math.random() - 0.5) * screenShake;
                const dy = (Math.random() - 0.5) * screenShake;
                document.getElementById('game-container').style.transform = `translate(${dx}px, ${dy}px)`;
                screenShake *= 0.8;
                if (screenShake < 0.5) {
                    screenShake = 0;
                    document.getElementById('game-container').style.transform = 'none';
                }
            }

            ctx.clearRect(0, 0, canvas.width, canvas.height);
            
            ctx.strokeStyle = 'rgba(56, 189, 248, 0.06)';
            ctx.lineWidth = 1;
            for(let i=0; i<canvas.width; i+=40) { ctx.beginPath(); ctx.moveTo(i, 0); ctx.lineTo(i, canvas.height); ctx.stroke(); }
            for(let j=0; j<canvas.height; j+=40) { ctx.beginPath(); ctx.moveTo(0, j); ctx.lineTo(canvas.width, j); ctx.stroke(); }

            particles.forEach((p, index) => {
                p.x += p.vx; p.y += p.vy; p.alpha -= 0.02;
                if (p.alpha <= 0) { particles.splice(index, 1); }
                else {
                    ctx.save();
                    ctx.globalAlpha = p.alpha;
                    ctx.fillStyle = p.color;
                    ctx.beginPath(); ctx.arc(p.x, p.y, p.radius, 0, Math.PI * 2); ctx.fill();
                    ctx.restore();
                }
            });

            if (flashIntensity > 0) {
                ctx.fillStyle = `rgba(255, 255, 255, ${flashIntensity})`;
                ctx.fillRect(0, 0, canvas.width, canvas.height);
                flashIntensity -= 0.05;
            }

            ctx.save();
            ctx.translate(target.x, target.y);
            ctx.rotate(target.angle);
            
            ctx.shadowBlur = 10;
            ctx.shadowColor = '#38bdf8';
            
            ctx.strokeStyle = '#38bdf8';
            ctx.lineWidth = 3;
            ctx.beginPath(); ctx.arc(0, 0, target.radius, 0, Math.PI * 2); ctx.stroke();
            
            ctx.strokeStyle = '#f87171';
            ctx.lineWidth = 1.5;
            ctx.beginPath(); ctx.moveTo(-target.radius, 0); ctx.lineTo(target.radius, 0); ctx.stroke();
            ctx.beginPath(); ctx.moveTo(0, -target.radius); ctx.lineTo(0, target.radius); ctx.stroke();
            
            ctx.fillStyle = '#ef4444';
            ctx.beginPath(); ctx.arc(0, 0, 5, 0, Math.PI * 2); ctx.fill();
            
            ctx.restore();
            
            ctx.fillStyle = 'rgba(255,255,255,0.7)';
            ctx.font = '10px Arial';
            ctx.fillText(`Target Lvl ${gameLevel}`, target.x - 28, target.y - target.radius - 6);

        }, 1000 / 60);
    }

    function resetTarget() {
        target.x = Math.random() * (canvas.width - 60) + 30; 
        target.y = Math.random() * (canvas.height - 60) + 30;
    }

    // --- بوابات دفع وسيرفر Pi النظيفة الأصلية 100% ---
    function buyAmmoWithPi() {
        if (typeof Pi === 'undefined' || !window.Pi) {
            document.getElementById('game-status').innerText = "⚠️ يجب فتح اللعبة من داخل تطبيق Pi Browser لتشغيل الدفع الحقيقي.";
            return;
        }

        document.getElementById('game-status').innerText = "⚡ جاري تجهيز فاتورة الدفع في محفظة Pi...";

        const paymentData = {
            amount: 1.0, 
            memo: "شحن 30 ذخيرة - لعبة الصياد",
            metadata: { item_code: "ammo_box_30", buyer: playerPiUser || "unknown" },
            uid: currentPiUserId || ""
        };

        const callbacks = {
            onReadyForServerApproval: function(paymentId) { approvePaymentOnBackend(paymentId); },
            onReadyForServerCompletion: function(paymentId, txid) { completePaymentOnBackend(paymentId, txid); },
            onCancel: function(paymentId) {
                document.getElementById('game-status').innerText = "❌ تم إلغاء عملية الدفع.";
            },
            onError: function(error, payment) {
                document.getElementById('game-status').innerText = "⚠️ خطأ في معالجة عملية الدفع.";
            }
        };
        Pi.createPayment(paymentData, callbacks);
    }

    async function approvePaymentOnBackend(paymentId) {
        try {
            await fetch('/api/approve', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ paymentId: paymentId })
            });
        } catch (err) { console.error(err); }
    }

    async function completePaymentOnBackend(paymentId, txid) {
        try {
            const response = await fetch('/api/complete', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ paymentId: paymentId, txid: txid })
            });
            const result = await response.json();
            
            if (result.success) {
                ammo += 30; 
                document.getElementById('ammo-val').innerText = ammo;
                document.getElementById('game-status').innerText = "🪙 تم المزامنة بنجاح وشحن 30 ذخيرة إضافية! 🔥";
                updateSupabaseScore();
            }
        } catch (err) { console.error(err); }
    }
    
    async function onIncompletePaymentFound(payment) {
        if (payment && payment.identifier) {
            try {
                await fetch('/api/complete', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ paymentId: payment.identifier, txid: payment.transaction.txid })
                });
            } catch (e) { console.error(e); }
        }
    }
</script>
</body>
</html>
