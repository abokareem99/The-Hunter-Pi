<script>
    const SUPABASE_URL = "https://xolwuawlnruvzqowxxbh.supabase.co";
    const SUPABASE_ANON_KEY = "EyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InhvbHd1YXdsbnJ1dnpxb3d4eGJoIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzcyMzgyNjEsImV4cCI6MjA5MjgxNDI2MX0.9ZbncYpfTr3qpFWZ-7yx8M_jf4MHpHzdp_mcuICS28w";
    const TABLE_NAME = "hunter_game_scores"; 

    // التعديل الحاسم لتهيئة الكلاينت بالشكل الصحيح للنسخة الثانية ومنع الـ Invalid API key
    const _supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    let score = 0;
    let ammo = 30;
    let currentWeapon = "classic"; 
    let playerPiUser = "";
    let audioCtx = null;
    let hasLoggedIn = false;

    const targetsConfig = {
        bird: { radius: 18, pts: 10, speedFactor: 1, name: "🕊️ طائر مائي", health: 1 },
        deer: { radius: 22, pts: 15, speedFactor: 1.3, name: "🦌 غزال جبلي", health: 1 },
        monster: { radius: 30, pts: 30, speedFactor: 2.1, name: "👹 وحش الميدان", health: 2 }
    };

    let target = { x: 100, y: 100, xSpeed: 2.5, ySpeed: 2, currentHealth: 1, ...targetsConfig.bird };
    let lastShot = { x: -100, y: -100, timer: 0 };

    const canvas = document.getElementById('hunting-canvas');
    const ctx = canvas.getContext('2d');
    let gameInterval;

    function initAudio() {
        if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    }

    function playSound(type) {
        try {
            initAudio();
            if (!audioCtx) return;
            let osc = audioCtx.createOscillator();
            let gain = audioCtx.createGain();
            osc.connect(gain); gain.connect(audioCtx.destination);
            if (type === 'shoot') {
                osc.type = 'sawtooth'; osc.frequency.setValueAtTime(300, audioCtx.currentTime);
                osc.frequency.exponentialRampToValueAtTime(40, audioCtx.currentTime + 0.15);
                gain.gain.setValueAtTime(0.3, audioCtx.currentTime); osc.start(); osc.stop(audioCtx.currentTime + 0.15);
            } else if (type === 'hit') {
                osc.type = 'triangle'; osc.frequency.setValueAtTime(400, audioCtx.currentTime);
                osc.frequency.exponentialRampToValueAtTime(900, audioCtx.currentTime + 0.2);
                gain.gain.setValueAtTime(0.4, audioCtx.currentTime); osc.start(); osc.stop(audioCtx.currentTime + 0.2);
            }
        } catch (e) {}
    }

    function freeLoginWithPi() {
        if (hasLoggedIn) return;
        initAudio(); 
        document.getElementById('btn-login').innerText = "جاري فتح الميدان...";
        
        if (typeof Pi === 'undefined' || !window.Pi || !window.Pi.authenticate) {
            console.log("تم رصد متصفح خارجي - تفعيل حساب المطور الاحتياطي");
            handleLoginSuccess("AbuKareem_Dev");
            return;
        }
        
        Pi.authenticate(['username', 'payments'], onIncompletePaymentFound).then(function(auth) {
            handleLoginSuccess(auth.user.username);
        }).catch((err) => {
            console.warn("خطأ مصادقة Pi SDK، التحول للاحتياطي:", err);
            handleLoginSuccess("AbuKareem_Dev");
        });
    }

    async function handleLoginSuccess(username) {
        hasLoggedIn = true;
        playerPiUser = username;
        document.getElementById('player-name').innerText = playerPiUser;
        
        try {
            let { data, error } = await _supabaseClient
                .from(TABLE_NAME)
                .select('high_score')
                .eq('pi_username', playerPiUser)
                .maybeSingle();
                
            if (data) { 
                score = data.high_score || 0; 
                document.getElementById('score-val').innerText = score;
            }
        } catch(e) { 
            let localHighScore = localStorage.getItem('hunter_high_score_' + playerPiUser) || 0;
            score = parseInt(localHighScore);
            document.getElementById('score-val').innerText = score;
        }
        enterGameView();
        loadLeaderboard();
    }

    function enterGameView() {
        document.getElementById('auth-section').className = 'hidden';
        document.getElementById('game-section').className = '';
        startGameLoop();
    }

    async function updateSupabaseScore() {
        try {
            console.log("إرسال السكور الجديد للسيرفر عبر UPSERT المباشر الحركي...");
            
            const { error } = await _supabaseClient
                .from(TABLE_NAME)
                .upsert(
                    { pi_username: playerPiUser, high_score: score },
                    { onConflict: 'pi_username' }
                );

            if (error) {
                console.error("فشل إرسال البيانات لجدار حماية الـ RLS:", error.message);
            } else {
                console.log("تم تحديث النقاط بنجاح صلب داخل الجدول! 🎯");
                loadLeaderboard();
            }
            
        } catch (err) {
            console.error("خطأ غير متوقع في معالجة النقاط:", err);
        }
    }

    async function loadLeaderboard() {
        try {
            let { data, error } = await _supabaseClient.from(TABLE_NAME).select('*').order('high_score', { ascending: false }).limit(5);
            const tbody = document.getElementById('leaderboard-body');
            tbody.innerHTML = "";
            if (data && data.length > 0) {
                data.forEach((row, index) => {
                    const tr = document.createElement('tr');
                    if (row.pi_username === playerPiUser) tr.style.backgroundColor = "rgba(56, 189, 248, 0.1)";
                    tr.innerHTML = `<td>${index + 1}</td><td>${row.pi_username}</td><td style="color:#4ade80; font-weight:bold;">${row.high_score || 0}</td>`;
                    tbody.appendChild(tr);
                });
            } else {
                tbody.innerHTML = `<tr><td colspan="3" style="color: #94a3b8;">متصل بالسيرفر الآمن.. بانتظار السكور الأول! 🎯</td></tr>`;
            }
        } catch (err) {
            document.getElementById('leaderboard-body').innerHTML = `<tr><td colspan="3" style="color: #f87171;">خطأ في جلب الصدارة</td></tr>`;
        }
    }

    function executeShot(clientX, clientY) {
        if (ammo <= 0) return;
        ammo--; 
        document.getElementById('ammo-val').innerText = ammo;
        const rect = canvas.getBoundingClientRect();
        const mouseX = clientX - rect.left; const mouseY = clientY - rect.top;
        
        triggerVisualAudioEffect();
        lastShot = { x: mouseX, y: mouseY, timer: 8 }; 
        const distance = Math.sqrt((mouseX - target.x)**2 + (mouseY - target.y)**2);

        if (distance <= target.radius) {
            target.currentHealth--;
            if (target.currentHealth > 0) { playSound('shoot'); return; }
            playSound('hit'); 
            let pts = target.pts;
            if (currentWeapon === "fast") pts = Math.ceil(pts * 1.5);
            score += pts;
            document.getElementById('score-val').innerText = score;
            updateSupabaseScore(); 
            resetTarget();
        }
    }

    canvas.addEventListener('mousedown', function(e) { e.preventDefault(); executeShot(e.clientX, e.clientY); });
    canvas.addEventListener('touchstart', function(e) {
        e.preventDefault();
        if(e.touches.length > 0) executeShot(e.touches[0].clientX, e.touches[0].clientY);
    });

    function triggerVisualAudioEffect() {
        const container = document.getElementById('game-container');
        ctx.fillStyle = "rgba(239, 68, 68, 0.6)"; ctx.fillRect(0,0, canvas.width, canvas.height);
        container.style.transform = `translate(${(Math.random() - 0.5) * 8}px, ${(Math.random() - 0.5) * 8}px)`;
        setTimeout(() => { container.style.transform = 'translate(0,0)'; }, 50);
    }

    function startGameLoop() {
        if(gameInterval) clearInterval(gameInterval);
        gameInterval = setInterval(() => {
            target.x += target.xSpeed; target.y += target.ySpeed;
            if (target.x - target.radius < 0 || target.x + target.radius > canvas.width) target.xSpeed = -target.xSpeed;
            if (target.y - target.radius < 0 || target.y + target.radius > canvas.height) target.ySpeed = -target.ySpeed;
            
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            ctx.beginPath(); ctx.arc(target.x, target.y, target.radius, 0, Math.PI * 2);
            ctx.fillStyle = target.name.includes("وحش") ? "#ef4444" : '#4ade80'; ctx.fill(); ctx.stroke();
            ctx.fillStyle = '#ffffff'; ctx.fillText(target.name, target.x - 20, target.y - target.radius - 8);
            if (lastShot.timer > 0) { lastShot.timer--; }
        }, 1000 / 60);
    }

    function resetTarget() {
        const types = Object.keys(targetsConfig);
        const config = targetsConfig[types[Math.floor(Math.random() * types.length)]];
        target.name = config.name; target.radius = config.radius; target.pts = config.pts;
        target.currentHealth = config.health; target.x = Math.random() * (canvas.width - 100) + 50; target.y = Math.random() * (canvas.height - 100) + 50;
    }
    function buyWeaponFree(name, typeKey) { currentWeapon = typeKey; }
    function buySniperWithPi() {}
    function reloadAmmo() { ammo = 30; document.getElementById('ammo-val').innerText = ammo; }
    function onIncompletePaymentFound(payment) {}
</script>
