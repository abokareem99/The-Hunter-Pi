<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>لعبة الصياد - النسخة الرسمية المطابقة</title>
    
    <script src="https://sdk.minepi.com/pi-sdk.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #0f172a;
            color: #ffffff;
            text-align: center;
            margin: 0;
            padding: 10px;
            touch-action: manipulation;
        }
        .container {
            max-width: 500px;
            margin: 10px auto;
            background: #1e293b;
            padding: 15px;
            border-radius: 20px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.6);
            border: 1px solid #334155;
        }
        h1 { 
            color: #38bdf8; 
            margin-bottom: 5px; 
            font-size: 24px;
            text-shadow: 0 2px 4px rgba(0,0,0,0.5);
        }
        .welcome-card {
            background: #0f172a;
            border-radius: 15px;
            padding: 25px 15px; 
            border: 2px solid #38bdf8;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
            margin-top: 15px;
        }
        .hunter-avatar {
            width: 180px;
            height: 180px;
            margin: 0 auto 20px auto;
            border-radius: 12px;
            border: 3px solid #38bdf8;
            box-shadow: 0 0 15px rgba(56, 189, 248, 0.4);
            background-image: url('https://the-hunter-pi.vercel.app/hunter-logo.png'); 
            background-size: cover;
            background-position: center;
        }
        .btn {
            background-image: linear-gradient(135deg, #38bdf8, #0284c7);
            color: white;
            border: none;
            padding: 14px 35px;
            font-size: 18px;
            font-weight: bold;
            border-radius: 30px;
            cursor: pointer;
            transition: 0.3s;
            box-shadow: 0 4px 15px rgba(56, 189, 248, 0.4);
            display: inline-block;
            width: 85%;
        }
        .btn:hover { 
            transform: scale(1.03);
        }
        .hidden { display: none; }
        .stats-bar {
            display: flex;
            justify-content: space-around;
            background: #0f172a;
            padding: 12px;
            border-radius: 12px;
            margin-bottom: 15px;
            font-weight: bold;
            border: 1px solid #334155;
            font-size: 13px;
        }
        #hunting-canvas {
            background-color: #020617;
            border: 3px solid #38bdf8;
            border-radius: 12px;
            cursor: crosshair; 
            max-width: 100%;
            touch-action: none;
        }
        .leaderboard-table {
            width: 100%;
            margin-top: 15px;
            border-collapse: collapse;
            background: #0f172a;
            border-radius: 12px;
            overflow: hidden;
            border: 1px solid #334155;
        }
        .leaderboard-table th, .leaderboard-table td {
            padding: 12px;
            border-bottom: 1px solid #1e293b;
            font-size: 13px;
        }
        .leaderboard-table th { background-color: #1e293b; color: #38bdf8; }
    </style>
</head>
<body>

<div class="container" id="game-container">
    <h1>🎮 لعبة الصياد (The Hunter)</h1>
    <p style="margin-top: 0; color: #94a3b8; font-size: 13px;">مشروع متصل بـ Supabase الحقيقي 💎</p>

    <div id="auth-section">
        <div class="welcome-card">
            <div class="hunter-avatar"></div>
            <p>مرحباً بك في ميدان الصيد الرقمي يا أبو كريم!<br>سجل دخولك الآن لتجهيز عتادك</p>
            <button class="btn" id="btn-login" onclick="initAndLoginWithPi()">دخول مجاني وبدء اللعب 🚀</button>
        </div>
    </div>

    <div id="game-section" class="hidden">
        <div class="stats-bar">
            <div>الصياد: <span id="player-name" style="color: #38bdf8;">...</span></div>
            <div>النقاط: <span id="score-val" style="color: #4ade80;">0</span> 🎯</div>
            <div>الذخيرة: <span id="ammo-val" style="color: #f87171;">30</span> 🎈</div>
        </div>

        <canvas id="hunting-canvas" width="480" height="280"></canvas>
        <p id="game-status" style="color: #fbbf24; font-weight: bold; min-height: 20px; font-size: 13px;">جاري إعداد الميدان...</p>
        
        <button class="btn" style="background-image: linear-gradient(135deg, #4ade80, #16a34a); font-size: 14px; padding: 10px 25px; width:auto;" onclick="reloadAmmo()">إعادة تعبئة الذخيرة مجاناً 🔋</button>

        <h3 style="margin-top: 25px; color: #38bdf8;">🏆 لوحة الصدارة العالمية</h3>
        <table class="leaderboard-table">
            <thead>
                <tr>
                    <th>الترتيب</th>
                    <th>الصياد</th>
                    <th>أعلى سكور 🎯</th>
                </tr>
            </thead>
            <tbody id="leaderboard-body">
                <tr>
                    <td colspan="3" style="color: #94a3b8;">اضغط دخول مجاني لعرض الصدارة...</td>
                </tr>
            </tbody>
        </table>
    </div>
</div>

<script>
    // إعدادات البيئة لـ Supabase المتوافقة مع الـ 6 أعمدة الحالية
    const SUPABASE_URL = "https://xolwuawlnruvzqowxxbh.supabase.co";
    const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InhvbHd1YXdsbnJ1dnpxb3d4eGJoIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzcyMzgyNjEsImV4cCI6MjA5MjgxNDI2MX0.9ZbncYpfTr3qpFWZ-7yx8M_jf4MHpHzdp_mcuICS28w";
    const TABLE_NAME = "hunter_game_scores"; 

    const _supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    let score = 0;
    let ammo = 30;
    let playerPiUser = "";
    let playerWallet = ""; 
    let isSdkInitialized = false;

    let target = { x: 150, y: 150, xSpeed: 3, ySpeed: 2.5, radius: 20 };
    const canvas = document.getElementById('hunting-canvas');
    const ctx = canvas.getContext('2d');
    let gameInterval;

    // دالة الدخول الذكية لحل خطأ postMessage والمتصفح العادي
    function initAndLoginWithPi() {
        document.getElementById('btn-login').innerText = "جاري الاتصال بالنظام...";
        
        try {
            if (typeof Pi !== 'undefined' && window.Pi) {
                // محاولة تهيئة الـ SDK
                if (!isSdkInitialized) {
                    window.Pi.init({ version: "2.0", sandbox: true });
                    isSdkInitialized = true;
                }
                
                // محاولة تسجيل الدخول بأمان
                window.Pi.authenticate(['username', 'payments'], onIncompletePaymentFound)
                .then(function(auth) {
                    playerPiUser = auth.user.username;
                    playerWallet = auth.user.uid || "Pi_Network_User";
                    handleLoginSuccess();
                })
                .catch((err) => {
                    console.warn("بيئة خارجية أو رفض اتصال من الـ SDK، التحويل للوضع التجريبي الآمن.");
                    setupDevAccount();
                });
            } else {
                setupDevAccount();
            }
        } catch (e) {
            console.warn("تم رصد خطأ في بيئة تشغيل الـ SDK (PostMessage)، تم تفعيل حماية المتصفح العادي.");
            setupDevAccount();
        }
    }

    // حساب المطور التجريبي لكي تتمكن من تشغيل اللعبة والحفظ من كمبيوترك مباشرة
    function setupDevAccount() {
        playerPiUser = "AbuKareem_Dev";
        playerWallet = "GCOHCVV66Y7UX3KB36V4B7NS5W"; // محفظتك الظاهرة بالصورة لملء العمود الحقيقي في جدولك
        handleLoginSuccess();
    }

    async function handleLoginSuccess() {
        document.getElementById('player-name').innerText = playerPiUser;
        
        // جلب أعلى سكور مسجل للاعب سابقاً
        try {
            let { data, error } = await _supabaseClient
                .from(TABLE_NAME)
                .select('high_score')
                .eq('pi_username', playerPiUser)
                .maybeSingle();
                
            if (data) { 
                score = data.high_score || 0; 
                document.getElementById('score-val').innerText = score;
            }
        } catch(e) {
            console.error("خطأ جلب السكور:", e);
        }
        
        // إرسال تحديث أولي لقاعدة البيانات لتأكيد الاتصال
        updateSupabaseScore();
        
        // إظهار اللعبة وإخفاء شاشة الترحيب
        document.getElementById('auth-section').className = 'hidden';
        document.getElementById('game-section').className = '';
        startGameLoop();
        loadLeaderboard();
    }

    // الدالة الاحترافية المزامنة مع الـ 6 أعمدة (تستعمل Upsert المبني على حقل pi_username)
    async function updateSupabaseScore() {
        if (!playerPiUser) return;
        
        try {
            // صياغة البيانات الموجهة بدقة للأعمدة الحالية في جدولك
            const payload = { 
                pi_username: playerPiUser, 
                wallet_address: playerWallet,
                high_score: score,
                updated_at: new Date().toISOString()
            };

            // تنفيذ الـ Upsert في جدولك الفارغ حالياً لتعبئته بالبيانات
            const { error } = await _supabaseClient
                .from(TABLE_NAME)
                .upsert(payload, { onConflict: 'pi_username' });

            if (error) {
                console.error("تفاصيل خطأ Supabase:", error);
                document.getElementById('game-status').innerText = "⚠️ خطأ مزامنة: " + error.message;
                document.getElementById('game-status').style.color = "#f87171";
            } else {
                document.getElementById('game-status').innerText = "🎯 تم المزامنة بنجاح مع قاعدة البيانات!";
                document.getElementById('game-status').style.color = "#4ade80";
                loadLeaderboard(); // تحديث لوحة الصدارة تلقائياً
            }
            
        } catch (err) {
            console.error("خطأ عام أثناء الإرسال لـ Supabase:", err);
        }
    }

    // جلب لوحة الصدارة العالمية وعرضها في الجدول
    async function loadLeaderboard() {
        try {
            let { data, error } = await _supabaseClient
                .from(TABLE_NAME)
                .select('pi_username, high_score')
                .order('high_score', { ascending: false })
                .limit(5);
                
            const tbody = document.getElementById('leaderboard-body');
            tbody.innerHTML = "";
            
            if (data && data.length > 0) {
                data.forEach((row, index) => {
                    const tr = document.createElement('tr');
                    if (row.pi_username === playerPiUser) tr.style.backgroundColor = "rgba(56, 189, 248, 0.1)";
                    tr.innerHTML = `<td>${index + 1}</td><td>${row.pi_username}</td><td style="color:#4ade80; font-weight:bold;">${row.high_score || 0}</td>`;
                    tbody.appendChild(tr);
                });
            } else {
                tbody.innerHTML = `<tr><td colspan="3" style="color: #94a3b8;">الجدول فارغ في Supabase، كن أول من يسجل سكور!</td></tr>`;
            }
        } catch (err) {
            document.getElementById('leaderboard-body').innerHTML = `<tr><td colspan="3" style="color: #f87171;">خطأ في جلب الصدارة</td></tr>`;
        }
    }

    // محرك اللعبة وإصابة الأهداف بالماوس أو اللمس
    function executeShot(clientX, clientY) {
        if (ammo <= 0) {
            document.getElementById('game-status').innerText = "❌ نفدت الذخيرة! أعد التعبئة.";
            document.getElementById('game-status').style.color = "#f87171";
            return;
        }
        ammo--; 
        document.getElementById('ammo-val').innerText = ammo;
        
        const rect = canvas.getBoundingClientRect();
        const mouseX = clientX - rect.left; 
        const mouseY = clientY - rect.top;
        
        // تأثير وميض أحمر خفيف عند الإطلاق
        ctx.fillStyle = "rgba(239, 68, 68, 0.3)"; 
        ctx.fillRect(0,0, canvas.width, canvas.height);
        
        const distance = Math.sqrt((mouseX - target.x)**2 + (mouseY - target.y)**2);

        if (distance <= target.radius) {
            score += 10;
            document.getElementById('score-val').innerText = score;
            updateSupabaseScore(); // حفظ فوري ومزامنة مع الأعمدة الستة
            resetTarget();
        }
    }

    canvas.addEventListener('mousedown', (e) => executeShot(e.clientX, e.clientY));
    canvas.addEventListener('touchstart', (e) => {
        if(e.touches.length > 0) executeShot(e.touches[0].clientX, e.touches[0].clientY);
    });

    function startGameLoop() {
        if(gameInterval) clearInterval(gameInterval);
        gameInterval = setInterval(() => {
            target.x += target.xSpeed; target.y += target.ySpeed;
            if (target.x - target.radius < 0 || target.x + target.radius > canvas.width) target.xSpeed = -target.xSpeed;
            if (target.y - target.radius < 0 || target.y + target.radius > canvas.height) target.ySpeed = -target.ySpeed;
            
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            ctx.beginPath(); ctx.arc(target.x, target.y, target.radius, 0, Math.PI * 2);
            ctx.fillStyle = '#4ade80'; ctx.fill(); ctx.stroke();
            ctx.fillStyle = '#ffffff'; ctx.fillText("🎯 هدف صيد", target.x - 25, target.y - target.radius - 5);
        }, 1000 / 60);
    }

    function resetTarget() {
        target.x = Math.random() * (canvas.width - 60) + 30; 
        target.y = Math.random() * (canvas.height - 60) + 30;
    }
    function reloadAmmo() { ammo = 30; document.getElementById('ammo-val').innerText = ammo; document.getElementById('game-status').innerText = "🎯 تم إعادة التعبئة!"; document.getElementById('game-status').style.color = "#4ade80"; }
    function onIncompletePaymentFound(payment) {}
</script>
</body>
</html>
